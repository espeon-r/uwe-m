<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Gold gradient for the trophy body -->
    <linearGradient id="goldBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="40%"  stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#CC7A00"/>
    </linearGradient>
    <!-- Lighter gold for the cup bowl highlight -->
    <linearGradient id="goldHighlight" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FFF176"/>
      <stop offset="50%"  stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E69500"/>
    </linearGradient>
    <!-- Base gradient -->
    <linearGradient id="goldBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8730A"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Background circle ── -->
  <circle cx="32" cy="32" r="30" fill="#1A1714"/>

  <!-- ── Trophy base plate ── -->
  <rect x="18" y="54" width="28" height="4" rx="2" fill="url(#goldBase)" stroke="#B8730A" stroke-width="0.5"/>

  <!-- ── Trophy stem ── -->
  <rect x="27" y="44" width="10" height="12" rx="1" fill="url(#goldBase)" stroke="#B8730A" stroke-width="0.5"/>

  <!-- ── Stem knob ── -->
  <ellipse cx="32" cy="44" rx="7" ry="2.5" fill="url(#goldBody)" stroke="#B8730A" stroke-width="0.5"/>

  <!-- ── Trophy cup body ── -->
  <!-- Main cup shape — trapezoid wider at top -->
  <path d="M18 18 Q14 18 14 24 Q14 36 24 40 L28 42 L36 42 L40 40 Q50 36 50 24 Q50 18 46 18 Z"
        fill="url(#goldHighlight)" stroke="#B8730A" stroke-width="0.8"/>

  <!-- Cup inner shadow at base -->
  <path d="M24 40 Q28 41.5 32 42 Q36 41.5 40 40 Q36 38 32 38 Q28 38 24 40 Z"
        fill="#CC7A00" opacity="0.5"/>

  <!-- ── Left handle ── -->
  <path d="M18 22 Q10 22 10 28 Q10 34 18 34"
        fill="none" stroke="url(#goldBody)" stroke-width="3.5"
        stroke-linecap="round"/>
  <path d="M18 22 Q10 22 10 28 Q10 34 18 34"
        fill="none" stroke="#FFF176" stroke-width="1"
        stroke-linecap="round" opacity="0.5"/>

  <!-- ── Right handle ── -->
  <path d="M46 22 Q54 22 54 28 Q54 34 46 34"
        fill="none" stroke="url(#goldBody)" stroke-width="3.5"
        stroke-linecap="round"/>
  <path d="M46 22 Q54 22 54 28 Q54 34 46 34"
        fill="none" stroke="#FFF176" stroke-width="1"
        stroke-linecap="round" opacity="0.5"/>

  <!-- ── Cup rim ── -->
  <ellipse cx="32" cy="18" rx="14" ry="3.5"
           fill="url(#goldBody)" stroke="#B8730A" stroke-width="0.8"/>

  <!-- ── Shine on cup body ── -->
  <ellipse cx="26" cy="24" rx="4" ry="7"
           fill="url(#shine)" transform="rotate(-15, 26, 24)"/>

  <!-- ── Football (soccer ball) inside cup ── -->
  <circle cx="32" cy="29" r="7" fill="white" stroke="#CCCCCC" stroke-width="0.3"/>
  <!-- Pentagon pattern on ball -->
  <path d="M32 23 L34.5 25.5 L33.5 28.5 L30.5 28.5 L29.5 25.5 Z"
        fill="#2C2C2C" stroke="white" stroke-width="0.4"/>
  <path d="M37.5 27 L36 29.5 L33.5 28.5 L34.5 25.5 Z"
        fill="#2C2C2C" stroke="white" stroke-width="0.4"/>
  <path d="M36 31.5 L33.5 33 L31 31.5 L31 29 L33.5 28.5 L36 29.5 Z"
        fill="#2C2C2C" stroke="white" stroke-width="0.4" opacity="0.8"/>
  <path d="M26.5 27 L29.5 25.5 L30.5 28.5 L28 30 Z"
        fill="#2C2C2C" stroke="white" stroke-width="0.4"/>

  <!-- ── Star above trophy ── -->
  <path d="M32 6 L33.2 9.6 L37 9.6 L34 11.9 L35.2 15.5 L32 13.2 L28.8 15.5 L30 11.9 L27 9.6 L30.8 9.6 Z"
        fill="#FFD700" stroke="#CC7A00" stroke-width="0.5"/>

</svg>
